services:
  app:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      SQLITE_PATH: /data/app.db
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-2000}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-10}
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-5}
      WORKER_STALE_JOB_TIMEOUT_MS: ${WORKER_STALE_JOB_TIMEOUT_MS:-300000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    volumes:
      - sqlite-data:/data
    command: ["npm", "run", "start"]

volumes:
  sqlite-data:
